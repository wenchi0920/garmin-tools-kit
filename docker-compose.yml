services:
  garmin-tools:
    build: .
    container_name: garmin-tools-kit
    volumes:
      - ./client:/app/client
      - ./models:/app/models
      - ./data:/app/data
      - ./example:/app/example
      - ./test_data:/app/test_data
      - ./tests:/app/tests
      - ./.garth:/app/.garth
      - ./garmin_tools.py:/app/garmin_tools.py
      - ./requirements.txt:/app/requirements.txt
      - ./GEMINI.md:/app/GEMINI.md
    environment:
      - TZ=Asia/Taipei
      - GARMIN_USERNAME
      - GARMIN_PASSWORD
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/scheduler_heartbeat -mmin -3 | grep . || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    stdin_open: true          # 保持交互式介面
    tty: true                 # 分配 TTY
    working_dir: /app
