services:
  garmin-tools:
    build: .
    container_name: garmin-tools-kit
    volumes:
      - ./:/app/
    environment:
      - TZ=Asia/Taipei
      - GARMIN_USERNAME
      - GARMIN_PASSWORD
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/scheduler_heartbeat -mmin -3 | grep . || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    stdin_open: true          # 保持交互式介面
    tty: true                 # 分配 TTY
    working_dir: /app
