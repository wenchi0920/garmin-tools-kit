name: Build Cross-Platform Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 第一階段：平行編譯三個平台
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: garmin-tools-linux
          - os: windows-latest
            artifact_name: garmin-tools-windows.exe
          - os: macos-latest
            artifact_name: garmin-tools-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --name garmin-tools garmin_tools.py

      - name: Rename Executable (Unix-like)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/garmin-tools dist/${{ matrix.artifact_name }}

      - name: Rename Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Rename-Item -Path "dist/garmin-tools.exe" -NewName "${{ matrix.artifact_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  # 第二階段：建立 Release 並上傳檔案
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    # [明確答案]：解決 403 錯誤的核心權限設定
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # 這裡的路徑必須與 upload-artifact 的 name 對應
          files: |
            artifacts/garmin-tools-linux/garmin-tools-linux
            artifacts/garmin-tools-windows.exe/garmin-tools-windows.exe
            artifacts/garmin-tools-macos/garmin-tools-macos
          generate_release_notes: true  # 自動根據 Commit 產生 Release 說明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
