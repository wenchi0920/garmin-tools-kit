name: Build Windows GUI Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows GUI
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows GUI Executable
        shell: bash
        run: |
          # --noconsole: 不顯示終端機視窗
          # --collect-all: 打包 tkcalendar 與 babel 資源
          pyinstaller --onefile --noconsole \
            --name garmin-tools-gui-windows \
            --collect-all tkcalendar \
            --collect-all babel \
            garmin_gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-binary
          path: dist/garmin-tools-gui-windows.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-gui-binary
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/garmin-tools-gui-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
